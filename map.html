<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCF10 — แผนผังสถานที่</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f2ed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 500;
    color: #2c2c2a;
    margin-bottom: 1rem;
  }
  .toggle-wrap {
    display: flex;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    margin-bottom: 1.2rem;
  }
  .toggle-btn {
    padding: 0.5rem 1.6rem;
    font-size: 0.85rem;
    font-weight: 500;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #888780;
    transition: background 0.15s, color 0.15s;
  }
  .toggle-btn.active { background: #185FA5; color: #fff; }
  .toggle-btn:first-child { border-right: 1px solid #d3d1c7; }
  .map-img {
    width: 100%;
    max-width: 960px;
    border-radius: 12px;
    border: 1.5px solid #d3d1c7;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: block;
  }
</style>
</head>
<body>

<h1>แผนผังสถานที่จัดงาน Learning City Fesะ 10 เมืองแห่งการเรียนรู้ตลอดชีวิต ภาค 10</h1>

<div class="toggle-wrap">
  <button class="toggle-btn active" onclick="setView('2d', this)">2D Blueprint</button>
  <button class="toggle-btn" onclick="setView('3d', this)">3D View</button>
</div>

<img id="map" class="map-img" src="map.jpg" alt="แผนผัง LCF10">

<script>
  function setView(v, btn) {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('map').src = v === '2d' ? 'map.jpg' : 'map-3d.jpg';
  }
</script>
</body>
</html>
