<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCF10 — แผนผังสถานที่</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #f4f2ed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
    color: #2c2c2a;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 960px;
    margin-bottom: 1rem;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #185FA5;
    text-decoration: none;
    padding: 0.4rem 0.8rem;
    border: 1px solid #B5D4F4;
    border-radius: 8px;
    background: #E6F1FB;
    cursor: pointer;
    transition: background 0.15s;
  }
  .back-btn:hover { background: #B5D4F4; }

  h1 {
    font-size: 1.25rem;
    font-weight: 500;
    color: #2c2c2a;
    flex: 1;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #888780;
    text-align: right;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    margin-bottom: 1.5rem;
  }

  .toggle-btn {
    padding: 0.5rem 1.5rem;
    font-size: 0.82rem;
    font-weight: 500;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #888780;
    transition: background 0.15s, color 0.15s;
  }
  .toggle-btn.active { background: #185FA5; color: #fff; }
  .toggle-btn:first-child { border-right: 1px solid #d3d1c7; }

  .view { display: none; width: 100%; max-width: 960px; }
  .view.show { display: block; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1.2rem;
    margin-bottom: 1rem;
    font-size: 0.74rem;
    color: #5F5E5A;
  }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; }
  .ld { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .ld-dash { border: 1.5px dashed; width: 12px; height: 12px; border-radius: 3px; }

  /* ── 2D SVG ── */
  #svg2d {
    width: 100%;
    border-radius: 12px;
    border: 1.5px solid #d3d1c7;
    background: #fdfcf8;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: block;
    cursor: default;
  }

  /* ── 3D ── */
  .scene3d {
    width: 100%;
    perspective: 1200px;
    perspective-origin: 50% 25%;
  }

  .floor3d {
    width: 100%;
    transform-origin: center top;
    transform: rotateX(52deg) rotateZ(-6deg);
    transition: transform 0.5s cubic-bezier(0.34,1.1,0.64,1);
  }

  #svg3d {
    width: 100%;
    border-radius: 10px;
    border: 2px solid #b4b2a9;
    display: block;
    box-shadow: 18px 28px 0 #c5c3b9, 36px 56px 0 #d3d1c7;
  }

  .controls3d {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
    justify-content: flex-end;
  }
  .ctrl-lbl { font-size: 0.75rem; color: #5F5E5A; }
  input[type=range] {
    -webkit-appearance: none; height: 4px;
    background: #d3d1c7; border-radius: 2px; width: 110px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: #185FA5; cursor: pointer;
  }

  /* Info tooltip */
  .tip {
    position: fixed; pointer-events: none; z-index: 200;
    background: #2c2c2a; color: #fff;
    padding: 0.45rem 0.85rem; border-radius: 8px;
    font-size: 0.76rem; line-height: 1.5;
    opacity: 0; transition: opacity 0.15s;
    max-width: 200px;
  }
  .tip.show { opacity: 1; }

  /* zoom controls */
  .zoom-row {
    display: flex; gap: 0.4rem; margin-bottom: 0.8rem; justify-content: flex-end;
  }
  .z-btn {
    width: 30px; height: 30px; border-radius: 6px;
    border: 1px solid #d3d1c7; background: #fff; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    color: #5F5E5A; transition: background 0.12s;
  }
  .z-btn:hover { background: #f1efe8; }
</style>
</head>

<!-- ── 3D VIEW ── -->
<div class="view" id="view3d">

  <!-- ภาพ 3D จริง (วางไฟล์ map-3d.jpeg ไว้ใน folder เดียวกัน) -->
  <div style="width:100%;border-radius:12px;overflow:hidden;border:1.5px solid #d3d1c7;box-shadow:0 2px 16px rgba(0,0,0,0.10);">
    <img src="map-3d.jpg" alt="แผนผังสถานที่ LCF10 — มุมมอง 3D"
         style="width:100%;display:block;"
         onerror="this.parentElement.style.display='none';document.getElementById('svg3d-wrap').style.display='block'"/>
  </div>

  <!-- SVG fallback — แสดงเฉพาะเมื่อโหลดภาพไม่ได้ -->
  <div class="scene3d" id="svg3d-wrap" style="display:none;">
    <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem;justify-content:flex-end;">
      <span class="ctrl-lbl">มุมมอง</span>
      <input type="range" min="25" max="70" value="52" oninput="updateAngle3d(this.value)" id="aSlider" style="width:90px;">
      <span class="ctrl-lbl" id="aVal">52°</span>
      <span class="ctrl-lbl">หมุน</span>
      <input type="range" min="-20" max="20" value="-6" oninput="updateRot(this.value)" id="rSlider" style="width:90px;">
      <span class="ctrl-lbl" id="rVal">-6°</span>
    </div>
    <div class="floor3d" id="floor3d">
      <svg id="svg3d" viewBox="0 0 760 1040" xmlns="http://www.w3.org/2000/svg"
           onmousemove="moveTip(event)" onmouseleave="hideTip()">

        <defs>
          <filter id="sh" x="-5%" y="-5%" width="115%" height="115%">
            <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#0003"/>
          </filter>
        </defs>

        <!-- Background floor -->

<!-- Tooltip -->
<div class="tip" id="tip"></div>

<script>
  let scale2d = 1;
  const svg2 = document.getElementById('svg2d');

  function setView(v) {
    document.getElementById('view2d').classList.toggle('show', v === '2d');
    document.getElementById('view3d').classList.toggle('show', v === '3d');
    document.getElementById('btn2d').classList.toggle('active', v === '2d');
    document.getElementById('btn3d').classList.toggle('active', v === '3d');
  }

  function zoom2d(f) {
    scale2d = Math.min(3, Math.max(0.5, scale2d * f));
    svg2.style.transform = 'scale(' + scale2d + ')';
    svg2.style.transformOrigin = 'top center';
  }


  function resetZoom() {
    scale2d = 1;
    svg2.style.transform = 'scale(1)';
  }

  function updateAngle3d(v) {
    const r = document.getElementById('rSlider').value;
    document.getElementById('floor3d').style.transform = 'rotateX('+v+'deg) rotateZ('+r+'deg)';
    document.getElementById('aVal').textContent = v + '°';
  }

  function updateRot(v) {
    const a = document.getElementById('aSlider').value;
    document.getElementById('floor3d').style.transform = 'rotateX('+a+'deg) rotateZ('+v+'deg)';
    document.getElementById('rVal').textContent = v + '°';
  }

  const tip = document.getElementById('tip');
  function moveTip(e) {
    const el = e.target.closest('[data-tip]');
    if (!el) { hideTip(); return; }
    tip.textContent = el.getAttribute('data-tip');
    tip.classList.add('show');
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 28) + 'px';
  }
  function hideTip() { tip.classList.remove('show'); }
</script>
